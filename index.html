<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmes em Cartaz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topo">
    <h1>Filmes em Cartaz</h1>
</div>

<div class="container">

    <div class="filme">
        <img src="imgs/sinners.jpg" alt="Pecadores">

        <div class="info">
            <h2>Pecadores</h2>
            <p> 18 | Suspense | 2h17min</p>

            <div class="acoes">
                <h5> R$: 20,30</h5>

        
                <button class="btn-menos" data-valor="20.30">-</button>
                <button class="btn-mais" data-valor="20.30">+</button>

            </div>
                
            </div>
        </div>
    </div>

    <div class="filme">
        <img src="/imgs/be030e77758917.5c911d5121625.png" alt="Vingadores">

        <div class="info">
            <h2>Avengers: Endgame</h2>
            <p> 14 | Aventura | 3h</p>

            <div class="acoes">
                <h5> R$: 15,15</h5>

                <button class="btn-menos" data-valor="15.15">-</button>
                <button class="btn-mais" data-valor="15.15">+</button>
        
            </div>
        </div>
    </div>

    <div class="filme">
        <img src="/imgs/avatar_fire_and_ash_ver3_xlg.avif" alt="Avatar3">

        <div class="info">
            <h2>Avatar 3</h2>
            <p> 14 | Aventura | 3h 17min </p>

            <div class="acoes">
                <h5> R$: 25,16</h5>

                <button class="btn-menos" data-valor="25.16">-</button>
                <button class="btn-mais" data-valor="25.16">+</button>

            </div>
        </div>
    </div>

    <div class="filme">
        <img src="/imgs/batman.webp" alt="Batman">

        <div class="info">
            <h2>Batman</h2>
            <p> 12 | Crime | 2h32min</p>

            <div class="acoes">
                <h5> R$: 19,43</h5>

                <button class="btn-menos" data-valor="19.43">-</button>
                <button class="btn-mais" data-valor="19.43">+</button>

            </div>
        </div>
    </div>

    <div class="filme">
        <img src="imgs/photo.avif" alt="Jujutsu Kaisen 0">

        <div class="info">
            <h2>Jujutsu Kaisen 0: O Filme</h2>
            <p> 14 | Animação | 1h52min</p>

            <div class="acoes">
                <h5> R$: 22,99</h5>

                <button class="btn-menos" data-valor="22.99">-</button>
                <button class="btn-mais" data-valor="22.99">+</button>

            </div>
        </div>
    </div>


    <div class="total-compra">
        <p>Total: R$ <span id="valor-total">0.00</span></p>
        <button id="finalizar-compra">Finalizar Compra</button>
    </div>

</div>
     <script src = "javascript.js"></script>
</body>
</html>
