<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmes em Cartaz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topo">
    <h1>Filmes em Cartaz</h1>
</div>

<div class="container">

    <div class="filme">
        <img src="imgs/sinners.jpg" alt="Pecadores">

        <div class="info">
            <h2>Pecadores</h2>
            <p> 18 | Suspense | 2h17min</p>

            <div class="acoes">
                <span class="preco">R$ 20,30</span>
                <button>Comprar</button>
            </div>
        </div>
    </div>

    <div class="filme">
        <img src="/imgs/be030e77758917.5c911d5121625.png" alt="Vingadores">

        <div class="info">
            <h2>Avengers: Endgame</h2>
            <p> 14 | Aventura | 3h</p>

            <div class="acoes">
                <span class="preco">R$ 15,15</span>
                <button>Comprar</button>
            </div>
        </div>
    </div>

    <div class="filme">
        <img src="/imgs/avatar_fire_and_ash_ver3_xlg.avif" alt="Avatar3">

        <div class="info">
            <h2>Avatar 3</h2>
            <p> 14 | Aventura | 3h 17min </p>

            <div class="acoes">
                <span class="preco">R$ 25,16
                </span>
                <button>Comprar</button>
            </div>
        </div>
    </div>

    <div class="filme">
        <img src="/imgs/batman.webp" alt="Batman">

        <div class="info">
            <h2>Batman</h2>
            <p> 12 | Crime | 2h32min</p>

            <div class="acoes">
                <span class="preco">R$ 19,43</span>
                <button>Comprar</button>
            </div>
        </div>
    </div>

    <div class="filme">
        <img src="imgs/photo.avif" alt="Jujutsu Kaisen 0">

        <div class="info">
            <h2>Jujutsu Kaisen 0: O Filme</h2>
            <p> 14 | Animação | 1h52min</p>

            <div class="acoes">
                <span class="preco">R$ 22,99</span>
                <button>Comprar</button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
